title = "TinyBuddy secret scanning rules"

[extend]
useDefault = true

[[rules]]
id = "private-key-block"
description = "Private key material"
regex = '''-----BEGIN [A-Z ]*PRIVATE KEY-----'''
keywords = ["PRIVATE KEY"]

[[rules]]
id = "env-secret-assignment"
description = "Likely secret assigned in an environment file"
regex = '''(?i)(api[_-]?key|secret|token|password|passwd|pwd|client[_-]?secret)\s*=\s*["']?[^"'\s]{8,}'''
keywords = ["api", "secret", "token", "password", "passwd", "pwd"]

